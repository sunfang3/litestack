# Honker-on LiteCache L1 + cross-process invalidate for the example app.
# Multi-Puma-worker: invalidate: honker drops peer L1 on set/delete/clear.
# Docs: docs/HONKER.md · samples/litecache.honker.yml

development:
  l1: true
  invalidate: honker
  l1_max_entries: 5000
  l1_ttl_default: 5
  notify_ops:
    - set
    - delete
    - clear
  notify_channel: litecache
  watcher_poll_interval_ms: 5
  sleep_interval: 30

test:
  l1: false
  invalidate: none

production:
  l1: true
  invalidate: honker
  l1_max_entries: 10000
  l1_max_value_bytes: 65536
  l1_ttl_default: 5
  notify_ops:
    - set
    - delete
    - clear
  notify_channel: litecache
  watcher_poll_interval_ms: 5
  sleep_interval: 30
