# Litestack CI — Ruby 4 / Rails 8.1 support matrix
# Five blocking combinations:
#   1) Ruby 4.0.0 + Rails 8.1.0          (declared floor)
#   2) Ruby 4.0.5 + Rails 8.1.3          (exact target)
#   3) latest Ruby 4.x + latest Rails 8.x
#   4) Ruby 4.0.0 + latest Rails 8.x     (cross-corner)
#   5) latest Ruby 4.x + Rails 8.1.0     (cross-corner)
# Plus: Honker soak + LiteCache bench (needs Packages credentials)
# Non-blocking: Ruby head / Rails main (continue-on-error)

name: Tests

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

# packages:read — resolve honker from rubygems.pkg.github.com/sunfang3 when
# using GITHUB_TOKEN; prefer repo secret BUNDLE_RUBYGEMS__PKG__GITHUB__COM
# (format: "username:PAT" with read:packages) for private/fork packages.
permissions:
  contents: read
  packages: read

env:
  # Prefer explicit Packages secret; fall back to GITHUB_TOKEN for same-owner packages.
  BUNDLE_RUBYGEMS__PKG__GITHUB__COM: ${{ secrets.BUNDLE_RUBYGEMS__PKG__GITHUB__COM || format('{0}:{1}', github.actor, secrets.GITHUB_TOKEN) }}

jobs:
  lower-bound:
    name: Ruby 4.0.0 + Rails 8.1.0
    runs-on: ubuntu-latest
    env:
      BUNDLE_GEMFILE: ${{ github.workspace }}/gemfiles/rails81_min.gemfile
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0.0"
          bundler-cache: true
      - name: Fetch optional SQLite extensions
        run: bundle exec rake extensions:fetch
      - name: Resolve and test
        run: |
          bundle exec ruby -e 'require "rails"; abort Rails.version unless Rails.version.start_with?("8.1")'
          bundle exec rake test

  exact-target:
    name: Ruby 4.0.5 + Rails 8.1.3
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0.5"
          bundler-cache: true
      - name: Versions
        run: |
          ruby -v
          bundle exec ruby -e 'require "rails"; require "sqlite3"; puts "Rails=#{Rails.version} sqlite3=#{SQLite3::VERSION}"'
          bundle exec ruby -e 'require "honker"; puts "honker=#{Honker::VERSION}"'
      - name: Fetch optional SQLite extensions
        run: bundle exec rake extensions:fetch
      - name: Test
        run: bundle exec rake test
      - name: Honker-focused tests
        run: bundle exec rake test:honker
      - name: Standard
        run: bundle exec rake standard
      - name: Package verify
        run: bundle exec ruby scripts/verify_package.rb
      - name: Built-gem Rails 8.1 app smoke
        run: bundle exec rake integration:rails81

  latest-supported:
    name: Latest Ruby 4.x + Rails 8.x
    runs-on: ubuntu-latest
    env:
      BUNDLE_GEMFILE: ${{ github.workspace }}/gemfiles/rails8_latest.gemfile
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0"
          bundler-cache: true
      - name: Fetch optional SQLite extensions
        run: bundle exec rake extensions:fetch
      - name: Test and style
        run: |
          bundle exec rake test
          bundle exec rake standard
      - name: Package verify
        run: bundle exec ruby scripts/verify_package.rb

  min-ruby-latest-rails:
    name: Ruby 4.0.0 + latest Rails 8.x
    runs-on: ubuntu-latest
    env:
      BUNDLE_GEMFILE: ${{ github.workspace }}/gemfiles/rails8_latest.gemfile
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0.0"
          bundler-cache: true
      - name: Fetch optional SQLite extensions
        run: bundle exec rake extensions:fetch
      - name: Resolve and test
        run: bundle exec rake test

  latest-ruby-min-rails:
    name: Latest Ruby 4.x + Rails 8.1.0
    runs-on: ubuntu-latest
    env:
      BUNDLE_GEMFILE: ${{ github.workspace }}/gemfiles/rails81_min.gemfile
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0"
          bundler-cache: true
      - name: Fetch optional SQLite extensions
        run: bundle exec rake extensions:fetch
      - name: Resolve and test
        run: bundle exec rake test

  honker-soak:
    name: Honker soak + LiteCache bench
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0.5"
          bundler-cache: true
      - name: Honker version
        run: bundle exec ruby -e 'require "honker"; puts "honker=#{Honker::VERSION}"'
      - name: Multi-process soak
        run: bundle exec rake soak:honker
        env:
          LITESTACK_SOAK_DURATION: "12"
          LITESTACK_SOAK_JOBS: "24"
          LITESTACK_SOAK_CACHE_KEYS: "12"
      - name: LiteCache L1 baseline + compare
        run: bundle exec rake bench:litecache_l1
        env:
          LITESTACK_BENCH_ITERS: "800"

  head-warning:
    name: Ruby head / Rails main (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      BUNDLE_GEMFILE: ${{ github.workspace }}/gemfiles/rails8_latest.gemfile
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: head
          bundler-cache: true
      - name: Fetch optional SQLite extensions
        run: bundle exec rake extensions:fetch || true
      - name: Warning-only suite
        run: bundle exec rake test || true
