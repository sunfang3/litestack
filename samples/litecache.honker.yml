# Example Litecache + L1 + Honker invalidation for multi-process Rails.
#
# Gemfile:
#   gem "litestack"
#   gem "honker"   # optional soft dependency for invalidate: honker
#
# config/environments/production.rb:
#   config.cache_store = :litecache, {
#     path: Rails.root.join("storage", Rails.env, "cache.sqlite3").to_s,
#     config_path: Rails.root.join("config/litecache.yml").to_s,
#   }
#
# Or put options only in this YAML (config_path):

production:
  # path: set via cache_store options so it tracks Rails.env / storage/
  l1: true
  invalidate: honker
  l1_max_entries: 10000
  l1_max_value_bytes: 65536
  l1_ttl_default: 5          # soft backstop if a notify is lost
  notify_ops:
    - set
    - delete
    - clear
  notify_channel: litecache
  watcher_poll_interval_ms: 5
  sleep_interval: 30

development:
  # Single process: L1 alone is enough
  l1: true
  invalidate: none
  l1_max_entries: 5000

test:
  l1: false
  invalidate: none
